<!doctype html>
<html lang="en" ng-app="quizApp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Game – Adaptive Difficulty</title>

    <!-- AngularJS 1.8 from CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>

    <!-- Our AngularJS module and controller -->
    <script src="app.js"></script>
    <script src="controller.js"></script>

    <style>
      /* ── Reset & base ─────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
      }

      /* ── Main card ────────────────────────────────────────────── */
      .card {
        background: #fff;
        border-radius: 20px;
        padding: 32px 28px;
        width: 100%;
        max-width: 580px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
      }

      /* ── Header row ───────────────────────────────────────────── */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 2px solid #e8edf2;
      }
      .header h1 {
        font-size: 22px;
        color: #2d3748;
        font-weight: 700;
      }
      .badges {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .badge {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
      }
      .badge-level {
        background: #bee3f8;
        color: #2b6cb0;
      }
      .badge-score {
        background: #c6f6d5;
        color: #276749;
      }
      .badge-acc {
        background: #fefcbf;
        color: #744210;
      }

      /* ── Accuracy progress bar ────────────────────────────────── */
      .acc-bar-wrap {
        margin-bottom: 20px;
      }
      .acc-bar-label {
        font-size: 12px;
        color: #718096;
        margin-bottom: 4px;
      }
      .acc-bar-bg {
        background: #e2e8f0;
        border-radius: 6px;
        height: 8px;
        overflow: hidden;
      }
      .acc-bar-fill {
        height: 100%;
        border-radius: 6px;
        background: linear-gradient(90deg, #48bb78, #38a169);
        transition: width 0.4s ease;
      }

      /* ── Difficulty stars ─────────────────────────────────────── */
      .difficulty {
        font-size: 12px;
        color: #a0aec0;
        margin-bottom: 12px;
      }
      .star {
        color: #f6ad55;
      }
      .star-empty {
        color: #e2e8f0;
      }

      /* ── Question box ─────────────────────────────────────────── */
      .question-box {
        background: #f7fafc;
        border-left: 4px solid #667eea;
        border-radius: 0 12px 12px 0;
        padding: 20px;
        margin-bottom: 24px;
        min-height: 72px;
      }
      .question-box p {
        font-size: 17px;
        color: #2d3748;
        line-height: 1.6;
      }

      /* ── Answer grid ──────────────────────────────────────────── */
      .answers {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 20px;
      }

      .ans-btn {
        padding: 14px 12px;
        font-size: 14px;
        font-weight: 500;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        background: #fff;
        cursor: pointer;
        text-align: left;
        color: #2d3748;
        transition:
          background 0.15s,
          border-color 0.15s,
          transform 0.1s;
        line-height: 1.4;
      }
      .ans-btn:hover:not([disabled]) {
        background: #ebf4ff;
        border-color: #63b3ed;
        transform: translateY(-2px);
      }
      .ans-btn[disabled] {
        cursor: not-allowed;
      }

      /* Highlight states after answering */
      .ans-btn.correct {
        background: #c6f6d5;
        border-color: #48bb78;
        color: #22543d;
        font-weight: 700;
      }
      .ans-btn.wrong-selected {
        background: #fed7d7;
        border-color: #fc8181;
        color: #742a2a;
      }

      /* ── Result banner ────────────────────────────────────────── */
      .result {
        text-align: center;
        padding: 14px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 12px;
      }
      .result.ok {
        background: #c6f6d5;
        color: #22543d;
      }
      .result.fail {
        background: #fed7d7;
        color: #742a2a;
      }

      /* ── Level-change notice ──────────────────────────────────── */
      .level-notice {
        text-align: center;
        font-size: 13px;
        color: #718096;
        margin-bottom: 16px;
        min-height: 20px;
      }
      .level-notice.up {
        color: #276749;
        font-weight: 600;
      }
      .level-notice.down {
        color: #c53030;
        font-weight: 600;
      }

      /* ── Next button ──────────────────────────────────────────── */
      .btn-next {
        display: block;
        width: 100%;
        padding: 14px;
        font-size: 15px;
        font-weight: 700;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .btn-next:hover {
        opacity: 0.88;
      }

      /* ── Loading state ────────────────────────────────────────── */
      .loading {
        text-align: center;
        padding: 40px 0;
        color: #a0aec0;
        font-size: 15px;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 4px solid #e2e8f0;
        border-top-color: #667eea;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 12px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <!-- ng-controller wraps the entire UI so all bindings are in scope -->
    <div class="card" ng-controller="QuizController">
      <!-- ── Header: title + stat badges ─────────────────────────── -->
      <div class="header">
        <h1>📚 Quiz Game</h1>
        <div class="badges">
          <span class="badge badge-level">Level {{ currentLevel }} / 5</span>
          <span class="badge badge-score">Score {{ score }}</span>
          <span class="badge badge-acc">{{ accuracy }}% acc</span>
        </div>
      </div>

      <!-- ── Accuracy progress bar ────────────────────────────────── -->
      <div class="acc-bar-wrap">
        <div class="acc-bar-label">Accuracy</div>
        <div class="acc-bar-bg">
          <div class="acc-bar-fill" ng-style="{ width: accuracy + '%' }"></div>
        </div>
      </div>

      <!-- ── Loading spinner ──────────────────────────────────────── -->
      <div class="loading" ng-if="loading">
        <div class="spinner"></div>
        Loading question…
      </div>

      <!-- ── Main quiz area (hidden while loading) ────────────────── -->
      <div ng-if="!loading && currentQuestion">
        <!-- Difficulty stars -->
        <div class="difficulty">
          Difficulty:
          <span ng-repeat="n in [1,2,3,4,5]">
            <span
              ng-class="n <= currentQuestion.difficulty ? 'star' : 'star-empty'"
              >★</span
            >
          </span>
        </div>

        <!-- Question text -->
        <div class="question-box">
          <p>{{ currentQuestion.content }}</p>
        </div>

        <!-- Answer buttons -->
        <div class="answers">
          <!--
          After answering:
            • correct answer always turns green  (.correct)
            • the wrong choice the player picked turns red  (.wrong-selected)
        -->
          <button
            class="ans-btn"
            ng-class="{
            'correct':        answered && answer === currentQuestion.correctAnswer,
            'wrong-selected': answered && answer === selectedAnswer && answer !== currentQuestion.correctAnswer
          }"
            ng-repeat="answer in currentQuestion.answers track by $index"
            ng-click="submitAnswer(answer)"
            ng-disabled="answered"
          >
            {{ answer }}
          </button>
        </div>

        <!-- Result banner (shown after answering) -->
        <div class="result ok" ng-if="answered && isCorrect">
          ✅ Correct! Well done!
        </div>
        <div class="result fail" ng-if="answered && !isCorrect">
          ❌ Wrong! Correct answer:
          <strong>{{ currentQuestion.correctAnswer }}</strong>
        </div>

        <!-- Level-change message -->
        <div class="level-notice" ng-class="levelClass" ng-if="answered">
          {{ levelMessage }}
        </div>

        <!-- Next question button -->
        <button class="btn-next" ng-if="answered" ng-click="loadQuestion()">
          Next Question →
        </button>
      </div>
      <!-- /quiz area -->
    </div>
    <!-- /card -->
  </body>
</html>
